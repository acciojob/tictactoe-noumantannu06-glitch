<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<div class="container">
        <!-- Player names form - FIXED IDs for Cypress -->
        <div id="nameForm">
            <h2>Tic Tac Toe</h2>
            <div class="form-group">
                <label for="player1">Player 1 (X):</label>
                <input type="text" id="player1" placeholder="Enter name">
            </div>
            <div class="form-group">
                <label for="player2">Player 2 (O):</label>
                <input type="text" id="player2" placeholder="Enter name">
            </div>
            <button id="submit">Start Game</button>
        </div>

        <!-- Game board -->
        <div id="gameBoard" class="board">
            <h1>Tic Tac Toe</h1>
            <div id="message" class="message"></div>
            <div class="grid">
                <div class="cell" id="1"></div>
                <div class="cell" id="2"></div>
                <div class="cell" id="3"></div>
                <div class="cell" id="4"></div>
                <div class="cell" id="5"></div>
                <div class="cell" id="6"></div>
                <div class="cell" id="7"></div>
                <div class="cell" id="8"></div>
                <div class="cell" id="9"></div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
